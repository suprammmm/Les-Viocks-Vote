<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les Viocks - Vote</title>
  <style>
    :root {
      --bg: #0f255f;
      --bg-dark: #0b1c47;
      --panel: #17357d;
      --panel-2: #22479f;
      --text: #f5f7ff;
      --muted: #b9c4e3;
      --lime: #bde100;
      --yellow: #ffe600;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      --radius: 24px;
    }
<div class="logo">
    <img src="logo.png" alt="Les Viocks">
</div>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg) 40%, #102967 100%);
      color: var(--text);
    }

    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }

    .navbar {
      position: sticky; top: 0;
      background: rgba(10,26,66,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-inner { display:flex; justify-content:space-between; padding:16px 0; }

    .brand { display:flex; gap:10px; font-weight:900; text-transform:uppercase; }

    .brand-badge {
      width:44px;height:44px;border-radius:12px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--lime),var(--yellow));
      color:#111;
    }

    .hero { padding:70px 0; }
    h1 { font-size: clamp(2rem,5vw,4rem); }

    .accent {
      background: linear-gradient(90deg,var(--lime),var(--yellow));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .btn {
      padding:14px 20px;border-radius:16px;
      font-weight:800;border:0;cursor:pointer;
    }

    .btn-primary {
      background: linear-gradient(90deg,var(--lime),var(--yellow));
      color:#111;
    }

    .vote-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .vote-card {
      background:linear-gradient(180deg,var(--panel-2),var(--panel));
      border-radius:24px;
      padding:20px;
    }

    .delay { margin:10px 0; }

    @media(max-width:900px){
      .vote-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-inner">
    <div class="brand">
      <div class="brand-badge">LV</div>
      <span>Les Viocks</span>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1><span class="accent">Vote</span> pour Les Viocks</h1>
    <p>Vote pour soutenir le serveur et gagner des récompenses.</p>

    <input id="pseudo" placeholder="Ton pseudo Minecraft" />
    <button class="btn btn-primary" onclick="savePseudo()">Enregistrer</button>
  </div>
</section>

<section class="container">
  <div class="vote-grid">

    <div class="vote-card">
      <h3>ServeursMinecraft</h3>
      <div class="delay">24h</div>
      <button class="btn btn-primary" onclick="vote('https://exemple.com/1')">Voter</button>
    </div>

    <div class="vote-card">
      <h3>Serveur-Prive</h3>
      <div class="delay">1h30</div>
      <button class="btn btn-primary" onclick="vote('https://exemple.com/2')">Voter</button>
    </div>

    <div class="vote-card">
      <h3>Serveur-Minecraft</h3>
      <div class="delay">1h30</div>
      <button class="btn btn-primary" onclick="vote('https://exemple.com/3')">Voter</button>
    </div>

  </div>
</section>

<script>
function savePseudo(){
  const p = document.getElementById('pseudo').value;
  localStorage.setItem('pseudo', p);
}

function vote(url){
  const p = localStorage.getItem('pseudo');
  if(!p){ alert('Entre ton pseudo'); return; }
  window.open(url+'?pseudo='+p,'_blank');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<div id="tsparticles"></div>

<script>
tsParticles.load("tsparticles", {
  particles: {
    number: { value: 60 },
    color: { value: "#c6ff00" },
    links: {
      enable: true,
      color: "#c6ff00"
    },
    move: {
      enable: true,
      speed: 1
    }
  },
  background: {
    color: "transparent"
  }
});
</script>
</body>
</html>
